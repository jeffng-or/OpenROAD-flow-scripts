run_config:
  design: gcd
  experiment: freq
  flow_home: /OpenROAD-flow-scripts/flow
  jobs: 3
  mode: sweep
  platform: asap7
  ray_outputs_dir: /work
  orfs_outputs_dir: /work
search_space:
